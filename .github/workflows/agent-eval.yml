name: Agent Evaluation Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e .
      - name: Generate synthetic eval cases
        run: agent-eval generate-cases --count 120 --out examples/wiki_eval_cases.jsonl
      - name: Run quality gate
        run: |
          agent-eval evaluate \
            --cases examples/wiki_eval_cases.jsonl \
            --gate examples/quality_gate.json \
            --json-out reports/eval_result.json \
            --markdown-out reports/eval_report.md \
            --traces-out reports/traces.jsonl \
            --fail-on-gate
      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-eval-reports
          path: reports/
